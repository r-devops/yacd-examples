name: Bad Material Test (auto-fail expected)
description: |
  Intentionally references a nonexistent git URL so the agent's
  material-clone phase fails with exit 128. Used to verify that
  pre-stage failures finish the run cleanly within seconds (the
  alternative was hanging forever in `running` state).
  Delete this file after the regression test.
trigger_mode: manual
materials:
  - name: ghost
    git: https://github.com/r-devops/this-repo-does-not-exist-ever.git
    branch: main
    triggers_pipeline: false
stages:
  - name: would-never-run
    steps:
      - name: noop
        run: echo "should never see this"
