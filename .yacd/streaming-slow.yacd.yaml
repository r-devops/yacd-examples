name: Streaming Slow
description: |
  30 lines, 1s apart - long enough for a browser to load the page mid-run
  and observe live log streaming.
trigger_mode: manual
stages:
  - name: stream
    steps:
      - name: print-slow
        run: |
          for i in $(seq 1 30); do
            echo "line $i at $(date -Iseconds)"
            sleep 1
          done
